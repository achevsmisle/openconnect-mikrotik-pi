name: Docker Multi-Arch Build & Push

on:
  push:
    tags:
      - '[0-9]+.[0-9]+*'
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: achevsmisle
  IMAGE_NAME: openconnect-mikrotik-pi

jobs:
  build:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && contains(github.ref_name, '.')

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag format
        id: validate_tag
        run: |
          TAG="${{ github.ref_name }}"
          if [[ ! $TAG =~ ^[0-9]+\.[0-9]+ ]]; then
            echo "❌ Invalid tag format: $TAG. Must start with X.Y"
            exit 1
          fi
          echo "✅ Valid tag: $TAG"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          description: |
            Multi-arch OpenConnect client optimized for Mikrotik devices, 
            Raspberry Pi and amd64 platforms. Configured via environment variables.
          tags: |
            type=raw,value=${{ steps.validate_tag.outputs.tag }}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
            type=sha,format=short,enable=true

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm/v7,linux/arm64/v8
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max